name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate launcher icon
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          convert -size 72x72 xc:'#1A1A2E' -fill '#00D4FF' -draw "circle 36,36 36,10" app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 48x48 xc:'#1A1A2E' -fill '#00D4FF' -draw "circle 24,24 24,6"  app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 96x96 xc:'#1A1A2E' -fill '#00D4FF' -draw "circle 48,48 48,14" app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:'#1A1A2E' -fill '#00D4FF' -draw "circle 72,72 72,20" app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: U      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FloatingVolume-APK
          path: app/build/outputs/apk/release/app-release.apk
